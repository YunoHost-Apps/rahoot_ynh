#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2

id = "rahoot"
name = "Rahoot"
description.en = "Quiz platform for smaller events"
description.fr = "Plateforme de quiz pour les petits événements"

version = "2.0.1~ynh1"

maintainers = ["Thovi98"]

[upstream]
license = "MIT"
code = "https://github.com/Ralex91/Rahoot"
fund = "https://ko-fi.com/Ralex91"

[integration]
yunohost = ">= 12.1.39"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.password]
    type = "password"

[resources]

    [resources.sources]

    [resources.sources.main]
    url = "https://github.com/Ralex91/Rahoot/archive/refs/tags/2.0.1.tar.gz"
    sha256 = "9224feeadde007f5fbcb9ce0eade2db9d9612fb87c2a878c1fcc00295f8cf201"

    autoupdate.strategy = "latest_github_tag"

    [resources.system_user]

    [resources.install_dir]
    
    [resources.permissions]
    main.url = "/"

    [resources.ports]

    [resources.nodejs]
    version = "22"
